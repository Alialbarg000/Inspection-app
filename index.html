<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Marine Survey Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- ── TOP BAR ── -->
  <header class="topbar">

    <button class="btn btn-ghost btn-icon" id="sidebar-toggle" title="Toggle menu" aria-label="Toggle menu">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6"  x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <a class="topbar-brand" href="#" onclick="return false">
      <div class="brand-anchor">⚓</div>
      <div>
        <div class="brand-text">Marine<span>Survey</span> Pro</div>
        <span class="brand-sub">Field Inspection Tool</span>
      </div>
    </a>

    <div class="topbar-progress">
      <div class="progress-track"><div id="global-fill"></div></div>
      <span id="global-label">0 / 0 completed</span>
      <span id="global-findings"></span>
    </div>

    <div class="topbar-actions">
      <button class="btn btn-report btn-sm" onclick="openReport()">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Generate Report
      </button>
      <button class="btn btn-danger btn-sm btn-icon" onclick="resetAll()" title="Reset inspection">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      </button>
    </div>

  </header>

  <!-- ── BODY ── -->
  <div class="body">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Inspection Systems</div>
        <div class="filter-row">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="remaining">Remaining</button>
          <button class="filter-btn" data-filter="findings">Findings</button>
        </div>
      </div>
      <div id="cat-nav"></div>
    </aside>

    <!-- ── MAIN ── -->
    <div id="main-area">

      <!-- ── WELCOME / INTAKE PANEL ── -->
      <div id="welcome-panel" style="display:flex;">
        <div class="welcome-inner">

          <div class="welcome-hero">
            <span class="welcome-anchor">⚓</span>
            <div class="welcome-title">Marine<span>Survey</span> Pro</div>
            <div class="welcome-sub">Professional vessel inspection tool — 6 systems · 30 sub-categories · 230+ inspection points</div>
          </div>

          <div class="intake-card">
            <div class="intake-section-title">Vessel & Survey Information</div>
            <div class="intake-grid">

              <div class="intake-field full">
                <label class="field-label" for="v-name">Vessel Name *</label>
                <input class="field-input" id="v-name" type="text" placeholder="e.g. S/V Blue Horizon">
              </div>

              <div class="intake-field">
                <label class="field-label" for="v-hull">HIN / Hull ID</label>
                <input class="field-input" id="v-hull" type="text" placeholder="e.g. ABC12345D404">
              </div>

              <div class="intake-field">
                <label class="field-label" for="v-ref">Reference / Order #</label>
                <input class="field-input" id="v-ref" type="text" placeholder="Optional reference">
              </div>

              <div class="intake-field">
                <label class="field-label" for="v-surveyor">Surveyor Name *</label>
                <input class="field-input" id="v-surveyor" type="text" placeholder="Full name">
              </div>

              <div class="intake-field">
                <label class="field-label" for="v-client">Client Name</label>
                <input class="field-input" id="v-client" type="text" placeholder="Owner / buyer name">
              </div>

              <div class="intake-field">
                <label class="field-label" for="v-date">Survey Date *</label>
                <input class="field-input" id="v-date" type="date">
              </div>

              <div class="intake-field">
                <label class="field-label" for="v-type">Survey Type</label>
                <select class="field-input" id="v-type">
                  <option>Pre-Purchase Survey</option>
                  <option>Insurance Survey</option>
                  <option>Condition &amp; Value Survey</option>
                  <option>Damage Survey</option>
                  <option>Annual Safety Check</option>
                  <option>Appraisal Survey</option>
                  <option>Sea Trial Report</option>
                  <option>Other</option>
                </select>
              </div>

              <div class="intake-field">
                <label class="field-label" for="v-location">Survey Location / Yard</label>
                <input class="field-input" id="v-location" placeholder="Marina, boatyard, or anchorage">
              </div>

              <div class="intake-field">
                <label class="field-label" for="v-weather">Weather / Sea State</label>
                <input class="field-input" id="v-weather" placeholder="e.g. Calm, 15kts SW, overcast">
              </div>

              <div class="intake-field full">
                <label class="field-label" for="v-purpose">Scope / Purpose Notes</label>
                <textarea class="field-input" id="v-purpose" placeholder="Describe the scope of survey, limitations, or any special instructions…"></textarea>
              </div>

            </div><!-- /.intake-grid -->

            <div class="intake-cta">
              <button class="btn btn-ghost" onclick="selectCategory('hull-deck')">
                Skip to Inspection
                <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </button>
              <button class="btn btn-accent" onclick="startInspection()">
                Begin Survey
                <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </button>
            </div>

          </div><!-- /.intake-card -->
        </div><!-- /.welcome-inner -->
      </div><!-- /#welcome-panel -->

      <!-- ── INSPECTION PANEL ── -->
      <div id="inspection-panel" style="display:none; flex-direction:column; flex:1; overflow:hidden;">

        <!-- Sub-category tabs -->
        <div class="subtab-bar" id="sub-tabs"></div>

        <!-- Section header bar -->
        <div class="section-header-bar">
          <div id="section-breadcrumb"></div>
          <div id="section-stats"></div>
        </div>

        <!-- Item list -->
        <div id="item-list"></div>

      </div><!-- /#inspection-panel -->

      <!-- ── REPORT PANEL ── -->
      <div id="report-panel" style="display:none;">

        <div class="report-top-actions">
          <button class="btn btn-accent" onclick="downloadPDF()">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download PDF
          </button>
          <button class="btn btn-ghost" onclick="window.print()">
            <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Print
          </button>
          <button class="btn btn-ghost" onclick="buildReportDOM()">
            <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
            Refresh Report
          </button>
          <button class="btn btn-ghost" onclick="document.getElementById('inspection-panel').style.display='flex'; document.getElementById('report-panel').style.display='none'; fullRender();">
            <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back to Survey
          </button>
        </div>

        <div id="report-output"></div>

      </div><!-- /#report-panel -->

    </div><!-- /#main-area -->
  </div><!-- /.body -->
</div><!-- /.app -->

<!-- ── TOAST ── -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<script src="script.js"></script>

<!-- Inline helper: validate and start -->
<script>
function startInspection() {
  const name = document.getElementById('v-name').value.trim();
  const surv = document.getElementById('v-surveyor').value.trim();
  if (!name || !surv) {
    showToast('⚠️  Please enter Vessel Name and Surveyor Name');
    return;
  }
  selectCategory('hull-deck');
}
</script>

</body>
</html>
